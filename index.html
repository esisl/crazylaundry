<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/crazylaundry/">
  <title>CrazyLaundry Runner</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#1a1a2e; touch-action:none; }
    canvas { display:block; width:100%; height:100%; }
    #ui { position:absolute; top:10px; left:0; right:0; text-align:center; color:#fff; font-family:monospace; font-size:18px; pointer-events:none; text-shadow:0 0 4px #000; }
    #gameover { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:#fff; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; gap:10px; }
    button { padding:12px 24px; font-size:16px; margin:5px; pointer-events:auto; background:#4ecca3; border:none; border-radius:4px; cursor:pointer; }
    button:disabled { opacity:0.5; }
    #submit-btn { background:#e94560; color:#fff; }
  </style>
  <script src="telegram-web-app.js"></script>
</head>
<body>
  <div id="ui">Счёт: <span id="score">0</span></div>
  <canvas id="game"></canvas>
  <div id="gameover">
    <h2>GAME OVER</h2>
    <p>Финальный счёт: <span id="final-score">0</span></p>
    <button id="restart-btn">ЗАНОВО</button>
    <button id="submit-btn">ОТПРАВИТЬ РЕКОРД</button>
  </div>

  <script>
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let W, H;
    const LANE_COUNT = 3;
    let playerLane = 1;
    let score = 0;
    let gameRunning = false;
    let objects = [];
    let lastTime = 0;
    let spawnTimer = 0;
    let difficulty = 1;
	// === СОСТОЯНИЕ ПАУЗЫ И ТАБЛИЦА ЛИДЕРОВ ===
	let isPaused = false;
    
	function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

	function togglePause() {
		if (!gameRunning) return; // Не паузим, если игра уже окончена
		
		isPaused = !isPaused;
		const panel = document.getElementById('pause-panel');
		
		if (isPaused) {
			panel.style.display = 'flex';
			loadLeaderboard(); // Загружаем при открытии
		} else {
			panel.style.display = 'none';
			lastTime = performance.now(); // Сбрасываем таймер, чтобы не было скачка dt
		}
	}
	async function loadLeaderboard() {
		const list = document.getElementById('lb-list');
		list.innerHTML = '<p style="text-align:center; color:#aaa;">Загрузка...</p>';
		
		try {
			const res = await fetch('./api/scores.php');
			if (!res.ok) throw new Error(`HTTP ${res.status}`);
			const data = await res.json();
			
			if (!Array.isArray(data) || data.length === 0) {
			list.innerHTML = '<p style="text-align:center; color:#888;">Пока нет рекордов</p>';
			return;
			}
			
			let html = `<table style="width:100%; border-collapse:collapse; font-size:15px;">
			<tr style="border-bottom:2px solid #4ecca3;">
				<th style="padding:8px; text-align:center; color:#aaa;">#</th>
				<th style="padding:8px; text-align:left;">Игрок</th>
				<th style="padding:8px; text-align:right;">Счёт</th>
			</tr>`;
			
			data.forEach((row, i) => {
			const name = row.username || `User ${row.user_id}`;
			html += `<tr style="border-bottom:1px solid #333;">
				<td style="padding:6px; text-align:center; color:#888;">${i + 1}</td>
				<td style="padding:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${name}</td>
				<td style="padding:6px; text-align:right; font-weight:bold; color:#f9ed69;">${row.score}</td>
			</tr>`;
			});
			html += '</table>';
			list.innerHTML = html;
		} catch (e) {
			list.innerHTML = `<p style="text-align:center; color:#e94560;">Ошибка: ${e.message}</p>`;
		}
	}

    // Управление: тап/клик по левой/правой половине экрана
    function handleInput(clientX) {
      if (clientX < W / 2) playerLane = Math.max(0, playerLane - 1);
      else playerLane = Math.min(LANE_COUNT - 1, playerLane + 1);
    }
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(e.touches[0].clientX); });
    canvas.addEventListener('mousedown', e => handleInput(e.clientX));

    function spawnObject() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      const isIron = Math.random() < 0.35;
      const laneW = W / LANE_COUNT;
      objects.push({
        x: laneW * lane + laneW / 2,
        y: -40,
        type: isIron ? 'iron' : 'item',
        speed: (H * 0.0025 * difficulty) + (Math.random() * H * 0.0015)
      });
    }

    function update(dt) {
      if (!gameRunning) return;
      spawnTimer += dt;
      difficulty = 1 + (score * 0.02); // Ускорение со временем
      if (spawnTimer > 700 / difficulty) { spawnObject(); spawnTimer = 0; }

      const playerY = H * 0.82;
      const laneW = W / LANE_COUNT;
      const playerW = laneW * 0.55;
      const playerX = laneW * playerLane + laneW / 2;

      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        obj.y += obj.speed * (dt / 16);

        // Коллизия (прямоугольник игрока vs круг объекта)
        const dx = Math.abs(obj.x - playerX);
        const dy = Math.abs(obj.y - playerY);
        if (dx < playerW && dy < 35) {
          if (obj.type === 'iron') { gameOver(); return; }
          score++;
          document.getElementById('score').textContent = score;
          objects.splice(i, 1);
          continue;
        }
        if (obj.y > H + 50) objects.splice(i, 1);
      }
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, W, H);

      // Дорожки
      ctx.strokeStyle = '#2d2d44';
      ctx.lineWidth = 2;
      for (let i = 1; i < LANE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * (W / LANE_COUNT), 0);
        ctx.lineTo(i * (W / LANE_COUNT), H);
        ctx.stroke();
      }

      // Игрок
      const laneW = W / LANE_COUNT;
      const playerY = H * 0.82;
      const playerW = laneW * 0.55;
      const playerX = laneW * playerLane + laneW / 2;
      ctx.fillStyle = '#4ecca3';
      ctx.fillRect(playerX - playerW/2, playerY - 20, playerW, 40);

      // Объекты
      objects.forEach(obj => {
        ctx.fillStyle = obj.type === 'iron' ? '#e94560' : '#f9ed69';
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, 16, 0, Math.PI*2);
        ctx.fill();
        // Метка для отладки
        ctx.fillStyle = '#000';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(obj.type === 'iron' ? '🔥' : '👕', obj.x, obj.y + 3);
      });
    }

    function loop(time) {
		if (!gameRunning) return; // Игра окончена
		if (isPaused) {
			// Во время паузы просто продолжаем вызывать rAF, но не обновляем логику
			requestAnimationFrame(loop);
			return;
		}
      const dt = time - lastTime;
      lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function startGame() {
      score = 0; playerLane = 1; objects = []; spawnTimer = 0; difficulty = 1;
      document.getElementById('score').textContent = '0';
      document.getElementById('gameover').style.display = 'none';
      gameRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(loop);


	  // Диагностика при запуске
		(function diagnose() {
		//log('🚀 Инициализация...', 'info');
		
		// Проверка SDK
		if (window.Telegram?.WebApp) {
			//log('✅ Telegram SDK доступен', 'info');
			//log(`👤 User (unsafe): ${JSON.stringify(window.Telegram.WebApp.initDataUnsafe?.user || {})}`, 'info');
		} else {
			logWarn('⚠️ Telegram SDK НЕ загружен. Проверьте: 1) интернет 2) путь к telegram-web-app.js');
		}
		
		// Проверка API эндпоинта
		fetch('./api/scores.php')
			.then(r => log(`🔍 GET /api/scores.php: ${r.status}`, r.ok ? 'info' : 'warn'))
			.catch(e => logError(`🔍 Ошибка проверки API: ${e.message}`));
		})();
    }

    function gameOver() {
      gameRunning = false;
      document.getElementById('final-score').textContent = score;
      document.getElementById('gameover').style.display = 'flex';
    }

    document.getElementById('restart-btn').onclick = startGame;
    document.getElementById('submit-btn').onclick = submitScore;


	async function submitScore() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  
  try {
    const tg = window.Telegram?.WebApp;
    if (!tg) {
      logError('❌ Telegram.WebApp не найден!');
      btn.textContent = '❌ Нет SDK';
      return;
    }
    
    const initData = tg.initData || '';
    //log(`🔑 initData длина: ${initData.length}`, 'info');
    
    // ОТПРАВЛЯЕМ initData В ЗАГОЛОВКЕ, а не в теле
    const response = await fetch('./api/scores.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Telegram-Init-Data': initData  // ← Сырая строка, без кодирования
      },
      body: JSON.stringify({ score })  // ← В теле только score
    });
    
    //log(`📡 Ответ: ${response.status}`, response.ok ? 'info' : 'error');
    const text = await response.text();
    //log(`📄 Тело: ${text}`, 'info');
    
    const data = JSON.parse(text);
    if (response.ok && data.status === 'ok') {
      //log(`✅ Сохранено!`, 'info');
      btn.textContent = '✅ OK';
    } else {
      logError(`❌ ${data.error || 'Ошибка'}`);
      btn.textContent = '❌ Ошибка';
    }
    
  } catch (e) {
    logError(`🔥 ${e.message}`);
    btn.textContent = '❌ Сеть';
  } finally {
    btn.disabled = false;
  }
}

	
    startGame();
  </script>



<!-- DEBUG CONSOLE - вставьте перед </body> -->
<div id="debug-panel" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:rgba(0,0,0,0.9);color:#0f0;font:12px monospace;padding:8px;z-index:99999;display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
    <strong>DEBUG</strong>
    <button onclick="toggleDebug();return false" style="padding:2px 8px;font-size:11px;">✕</button>
  </div>
  <div id="debug-log"></div>
  <button onclick="clearDebug();return false" style="margin-top:5px;padding:2px 8px;font-size:11px;">Очистить</button>
</div>
<script>
  // === Утилиты отладки ===
  function log(msg, type='info') {
	/*
    const panel = document.getElementById('debug-panel');
    const logEl = document.getElementById('debug-log');
    const time = new Date().toLocaleTimeString();
    const color = type==='error'?'#f66':type==='warn'?'#ff0':'#0f0';
    logEl.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
    logEl.scrollTop = logEl.scrollHeight;
    panel.style.display = 'block';
	*/
    console.log(`[DEBUG ${type.toUpperCase()}] ${msg}`);
  }
  function logError(msg) { log(msg, 'error'); }
  function logWarn(msg) { log(msg, 'warn'); }
  function clearDebug() { document.getElementById('debug-log').innerHTML = ''; }
  function toggleDebug() {
    const panel = document.getElementById('debug-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }
  // Показать панель по долгому тапу на канвас (для мобильных)
  document.getElementById('game')?.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) toggleDebug();
  }, {passive:true});
  // Горячая клавиша для Desktop: Ctrl+D
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'd') { e.preventDefault(); toggleDebug(); }
  });
</script>

<!-- Панель паузы и таблицы лидеров -->
<div id="pause-panel" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); color:#fff; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; z-index:100; padding:20px; box-sizing:border-box;">
  <h2 style="margin:0 0 15px 0; font-size:22px; text-align:center;">🏆 Таблица лидеров</h2>
  <div id="lb-list" style="width:100%; max-height:55vh; overflow-y:auto; margin-bottom:20px; background:rgba(255,255,255,0.05); border-radius:8px; padding:10px;">
    <p style="text-align:center; color:#aaa;">Загрузка...</p>
  </div>
  <button id="lb-resume" style="padding:12px 24px; font-size:16px; background:#4ecca3; border:none; border-radius:4px; cursor:pointer; color:#000; font-weight:bold;">▶ ПРОДОЛЖИТЬ</button>
</div>
<script>
		// Привязка кнопки "Продолжить"
	document.getElementById('lb-resume').onclick = togglePause;

	// Добавляем кнопку паузы в интерфейс (верхний правый угол)
	const pauseBtn = document.createElement('button');
	pauseBtn.innerHTML = '⏸';
	pauseBtn.style.cssText = 'position:absolute; top:10px; right:10px; width:40px; height:40px; font-size:18px; background:rgba(255,255,255,0.2); border:none; border-radius:50%; color:#fff; cursor:pointer; z-index:50; touch-action: manipulation;';
	pauseBtn.onclick = togglePause;
	document.body.appendChild(pauseBtn);
</script>
</body>
</html>
